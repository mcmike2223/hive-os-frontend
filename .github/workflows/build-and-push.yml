name: Build & Push Image

# Builds the production image and pushes it to GHCR on every push to main.
# The VPS auto-deploy timer (hive-os-infra) watches GHCR and redeploys when a
# new :latest digest appears.
#
# Next.js bakes NEXT_PUBLIC_* values into the bundle AT BUILD TIME, so they must
# be supplied here as build args. Configure them as repository Variables
# (Settings → Secrets and variables → Actions → Variables) — except the Reverb
# app key and Sentry DSN, which should be repository Secrets. Anything left unset
# falls back to the production defaults below.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-frontend
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ghcr.io/mcmike2223/hive-os-frontend:latest
            ghcr.io/mcmike2223/hive-os-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CENTRAL_DOMAINS=${{ vars.NEXT_PUBLIC_CENTRAL_DOMAINS }}
            NEXT_PUBLIC_ROOT_DOMAIN=${{ vars.NEXT_PUBLIC_ROOT_DOMAIN || 'gulfingot.com' }}
            NEXT_PUBLIC_SERVER_IP=${{ vars.NEXT_PUBLIC_SERVER_IP }}
            NEXT_PUBLIC_FRONTEND_DOMAIN=${{ vars.NEXT_PUBLIC_FRONTEND_DOMAIN || 'hive.gulfingot.com' }}
            NEXT_PUBLIC_BACKEND_DOMAIN=${{ vars.NEXT_PUBLIC_BACKEND_DOMAIN || 'hive-backend.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_DOMAIN=${{ vars.NEXT_PUBLIC_REVERB_DOMAIN || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_APP_KEY=${{ secrets.NEXT_PUBLIC_REVERB_APP_KEY }}
            NEXT_PUBLIC_REVERB_HOST=${{ vars.NEXT_PUBLIC_REVERB_HOST || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_PORT=${{ vars.NEXT_PUBLIC_REVERB_PORT || '443' }}
            NEXT_PUBLIC_REVERB_SCHEME=${{ vars.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
            INTERNAL_API_URL=${{ vars.INTERNAL_API_URL || 'http://backend:8000/api/v1' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_SKIP_BUILD_TYPECHECK=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
