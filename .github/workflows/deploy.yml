name: Deploy UI to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://hive-backend.gulfingot.com/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'https://hive.gulfingot.com' }}
            NEXT_PUBLIC_CENTRAL_DOMAINS=${{ secrets.NEXT_PUBLIC_CENTRAL_DOMAINS || 'hive.gulfingot.com,hive-backend.gulfingot.com' }}
            NEXT_PUBLIC_ROOT_DOMAIN=${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN || 'gulfingot.com' }}
            NEXT_PUBLIC_SERVER_IP=${{ secrets.NEXT_PUBLIC_SERVER_IP || '49.13.211.106' }}
            NEXT_PUBLIC_FRONTEND_DOMAIN=${{ secrets.NEXT_PUBLIC_FRONTEND_DOMAIN || 'hive.gulfingot.com' }}
            NEXT_PUBLIC_BACKEND_DOMAIN=${{ secrets.NEXT_PUBLIC_BACKEND_DOMAIN || 'hive-backend.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_DOMAIN=${{ secrets.NEXT_PUBLIC_REVERB_DOMAIN || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_APP_KEY=${{ secrets.NEXT_PUBLIC_REVERB_APP_KEY || 'reverb_key_a1b2c3d4e5f6' }}
            NEXT_PUBLIC_REVERB_HOST=${{ secrets.NEXT_PUBLIC_REVERB_HOST || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_PORT=${{ secrets.NEXT_PUBLIC_REVERB_PORT || '443' }}
            NEXT_PUBLIC_REVERB_SCHEME=${{ secrets.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
            INTERNAL_API_URL=${{ secrets.INTERNAL_API_URL || 'http://backend:8000/api/v1' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN || 'https://eeb4e1d02ddfb7bfe41c3599937c9963@o4511552629243904.ingest.us.sentry.io/4511552709591040' }}
            NEXT_SKIP_BUILD_TYPECHECK=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: Deployment is PULL-BASED (SSH from GitHub runners is blocked by the VPS
      # firewall, and we keep SSH closed to the public). A systemd timer on the VPS
      # (hive-autodeploy.timer -> scripts/auto-deploy.sh) pulls this image and recreates
      # the frontend container within ~2 minutes of this push.
      - name: Deployment note
        run: |
          echo "Image built & pushed. The VPS auto-deploy timer will pull and redeploy within ~2 min."
          echo "Manual trigger on the VPS: systemctl start hive-autodeploy.service"
