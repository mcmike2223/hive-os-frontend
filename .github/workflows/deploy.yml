name: Deploy UI to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://hive-backend.gulfingot.com/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'https://hive.gulfingot.com' }}
            NEXT_PUBLIC_CENTRAL_DOMAINS=${{ secrets.NEXT_PUBLIC_CENTRAL_DOMAINS || 'hive.gulfingot.com,hive-backend.gulfingot.com' }}
            NEXT_PUBLIC_ROOT_DOMAIN=${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN || 'gulfingot.com' }}
            NEXT_PUBLIC_SERVER_IP=${{ secrets.NEXT_PUBLIC_SERVER_IP || '49.13.211.106' }}
            NEXT_PUBLIC_FRONTEND_DOMAIN=${{ secrets.NEXT_PUBLIC_FRONTEND_DOMAIN || 'hive.gulfingot.com' }}
            NEXT_PUBLIC_BACKEND_DOMAIN=${{ secrets.NEXT_PUBLIC_BACKEND_DOMAIN || 'hive-backend.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_DOMAIN=${{ secrets.NEXT_PUBLIC_REVERB_DOMAIN || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_APP_KEY=${{ secrets.NEXT_PUBLIC_REVERB_APP_KEY || 'reverb_key_a1b2c3d4e5f6' }}
            NEXT_PUBLIC_REVERB_HOST=${{ secrets.NEXT_PUBLIC_REVERB_HOST || 'hive-ws.gulfingot.com' }}
            NEXT_PUBLIC_REVERB_PORT=${{ secrets.NEXT_PUBLIC_REVERB_PORT || '443' }}
            NEXT_PUBLIC_REVERB_SCHEME=${{ secrets.NEXT_PUBLIC_REVERB_SCHEME || 'https' }}
            INTERNAL_API_URL=${{ secrets.INTERNAL_API_URL || 'http://backend:8000/api/v1' }}
            NEXT_SKIP_BUILD_TYPECHECK=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_IP }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            set -x

            # Find the infrastructure directory containing docker-compose.prod.yml
            PROJECT_DIR=""
            for dir in /var/www/hive-infra /var/www/hive-os-infra ~/projects/hive-infra ~/projects/hive-os-infra /var/www/hive /var/www/Hive-Erp ~/projects/hive; do
              if [ -f "${dir}/docker-compose.prod.yml" ]; then
                PROJECT_DIR="${dir}"
                break
              fi
            done

            if [ -z "${PROJECT_DIR}" ]; then
              echo "Could not find infrastructure directory containing docker-compose.prod.yml" >&2
              exit 1
            fi

            cd "${PROJECT_DIR}"

            # Log in to GHCR on the VPS so we can pull private packages
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new frontend image
            docker compose -f docker-compose.prod.yml pull frontend

            # Recreate container with the new image
            docker compose -f docker-compose.prod.yml up -d frontend
